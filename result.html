<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MBTI测试结果</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6fb;
  padding:40px;
}
.box{
  max-width:700px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
h1,h2{
  text-align:center;
}
h3{
  margin-bottom:5px;
}
ul{
  list-style: disc inside;
  padding-left: 0;
}
.btnRow{
  margin-top:20px;
  display:flex;
  justify-content: space-between;
}
.btnGhost{
  background:none;
  border:1px solid #ccc;
  padding:10px 20px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="box">
<h1>你的MBTI人格类型</h1>
<div id="resultContent">
  <h2 id="type">ISTJ</h2>
  <div>
    <h3>性格优势</h3>
    <ul id="strengths"></ul>
  </div>
  <div>
    <h3>需要注意</h3>
    <ul id="weaknesses"></ul>
  </div>
  <div>
    <h3>适合职业</h3>
    <ul id="careers"></ul>
  </div>
  <div>
    <h3>成长建议</h3>
    <ul id="growth"></ul>
  </div>
</div>

<div class="btnRow">
  <button class="btnGhost" onclick="location.href='test.html'">重新测试</button>
</div>

<p class="tip">本页面不收集个人隐私数据，结果仅保存在你的浏览器本地。</p>
</div>

    careers:["心理咨询","教师","作家","设计"],
    growth:["设立界限","学会放松","接受不完美"]
  },
  INFP:{
    strengths:["富有同理心","价值观坚定","创造力强"],
    weaknesses:["情绪化","拖延","优柔寡断"],

    growth:["学会自我调节","设立界限","关注内心需求"]
  },
  ENFP:{
    strengths:["热情开朗","善于激励他人","创造力强"],
    weaknesses:["容易分心","不善收尾","情绪化"],
    careers:["营销","创意策划","培训","写作"],
    growth:["专注目标","管理时间","稳住情绪"]
  },

  },
  ESFJ:{

  },
  ESTP:{

  },
  ESFP:{
    strengths:["外向活泼","乐观","善于交际"],
    weaknesses:["易分心","情绪化","缺乏计划"],
    careers:["表演","销售","旅游","活动策划"],
    growth:["增强专注力","学会计划","管理情绪"]
  }
};

function renderResult(type){
  const doc = mbtiData[type];
  document.getElementById("type").textContent = type;
  ["strengths","weaknesses","careers","growth"].forEach(field=>{
    const el = document.getElementById(field);
    el.innerHTML = "";
    doc[field].forEach(item=>{
      const li = document.createElement("li");
      li.textContent = item;
      el.appendChild(li);
    });
  });
}

// 从 test.html 读取用户选择结果
const userType = localStorage.getItem("mbtiType") || "ISTJ";
renderResult(userType);
</script>
</body>
</html>
