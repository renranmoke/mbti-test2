<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBTI测试结果</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#111827;
      --accent:#2563eb;
      --shadow:0 12px 30px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%, #f4f6fb 100%);
      color:var(--text);
      padding:32px 16px;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid var(--line);
      padding:28px;
    }

    .header{
      text-align:center;
      margin-bottom:28px;
    }

    .title{
      font-size:18px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .type{
      font-size:54px;
      font-weight:800;
      color:var(--primary);
      margin:0;
      letter-spacing:2px;
    }

    .subtitle{
      margin-top:12px;
      font-size:18px;
      color:var(--text);
      line-height:1.8;
    }

    .summary{
      margin-top:18px;
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      text-align:left;
      line-height:1.9;
      color:#374151;
      font-size:15px;
    }

    .bars{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin:24px 0 30px;
    }

    @media (max-width:900px){
      .bars{
        grid-template-columns:1fr;
      }
    }

    .barCard{
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      background:#fcfcff;
    }

    .barTitle{
      font-size:14px;
      color:var(--muted);
      margin-bottom:10px;
    }

    .barLabels{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      margin-bottom:6px;
      color:#4b5563;
    }

    .track{
      height:12px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
    }

    .fill{
      height:100%;
      background:linear-gradient(90deg,#3b82f6,#6366f1);
      width:50%;
      transition:width .3s ease;
    }

    .barDesc{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      line-height:1.7;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    @media (max-width:900px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    .section{
      border:1px solid var(--line);
      border-radius:18px;
      padding:22px;
      background:#fff;
    }

    .section h2{
      margin:0 0 14px;
      font-size:20px;
      color:var(--primary);
    }

    .section ul{
      margin:0;
      padding-left:22px;
      line-height:1.95;
      font-size:15px;
      color:#374151;
    }

    .tip{
      margin-top:14px;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
    }

    .footer{
      margin-top:28px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .btnRow{
      margin-top:24px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
    }

    .btnPrimary{
      background:#111827;
      color:#fff;
    }

    .btnGhost{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="title">你的 MBTI 人格类型</div>
        <h1 class="type" id="mbtiType">ISTJ</h1>
        <div class="subtitle" id="subTitle">你是一个偏理性、稳定、有责任感的人格类型。</div>
      </div>

      <div class="summary" id="summaryText"></div>

      <div class="bars">
        <div class="barCard">
          <div class="barTitle">能量来源</div>
          <div class="barLabels"><span>外向 E</span><span>内向 I</span></div>
          <div class="track"><div class="fill" id="barEI"></div></div>
          <div class="barDesc" id="descEI"></div>
        </div>

        <div class="barCard">
          <div class="barTitle">信息处理</div>
          <div class="barLabels"><span>实感 S</span><span>直觉 N</span></div>
          <div class="track"><div class="fill" id="barSN"></div></div>
          <div class="barDesc" id="descSN"></div>
        </div>

        <div class="barCard">
          <div class="barTitle">决策方式</div>
          <div class="barLabels"><span>思考 T</span><span>情感 F</span></div>
          <div class="track"><div class="fill" id="barTF"></div></div>
          <div class="barDesc" id="descTF"></div>
        </div>

        <div class="barCard">
          <div class="barTitle">生活方式</div>
          <div class="barLabels"><span>判断 J</span><span>感知 P</span></div>
          <div class="track"><div class="fill" id="barJP"></div></div>
          <div class="barDesc" id="descJP"></div>
        </div>
      </div>

      <div class="grid">
        <div class="section">
          <h2>性格优势</h2>
          <ul id="strengths"></ul>
          <div class="tip" id="strengthTip"></div>
        </div>

        <div class="section">
          <h2>需要注意</h2>
          <ul id="weaknesses"></ul>
          <div class="tip" id="weaknessTip"></div>
        </div>

        <div class="section">
          <h2>恋爱/关系模式</h2>
          <ul id="love"></ul>
          <div class="tip" id="loveTip"></div>
        </div>

        <div class="section">
          <h2>适合职业与工作方式</h2>
          <ul id="career"></ul>
          <div class="tip" id="careerTip"></div>
        </div>

        <div class="section">
          <h2>压力下的你</h2>
          <ul id="stress"></ul>
          <div class="tip" id="stressTip"></div>
        </div>

        <div class="section">
          <h2>成长建议（最快见效的7天行动）</h2>
          <ul id="growth"></ul>
          <div class="tip" id="growthTip"></div>
        </div>
      </div>

      <div class="btnRow">
        <button class="btnGhost" onclick="location.href='test.html'">重新测试</button>
        <button class="btnPrimary" onclick="copyResult()">复制结果摘要</button>
      </div>

      <div class="footer">
        本测试仅用于自我了解与成长参考，结果会受到当前状态与答题方式影响。<br>
        结果数据仅保存在你的浏览器本地。
      </div>
    </div>
  </div>

  <script>

      ENFP: {

        strengths: [

        ],
        love: [

          "雷区：冷淡、控制、忽略你的表达欲",

        career: [

          "不适合长期过于机械、压抑、重复的岗位"
        ],
        stress: [
          "压力大时会拖延、逃避、刷手机、情绪波动",

          "可能突然失去动力，不想社交也不想做事",

        ],
        growth: [
          "每天先完成一件最重要的小任务",
          "练习把大目标拆成具体步骤",
          "减少无意义信息输入，比如短视频/刷屏",

        ],

        weaknessTip: "建议：你不是不行，而是太容易被分散注意力。",
        loveTip: "建议：对你来说，被认真回应，比一时浪漫更重要。",
        careerTip: "提示：你越能表达、连接与创造，越容易出成绩。",
        stressTip: "建议：你先把状态拉回来，结果自然会跟上。",
        growthTip: "做法：别一下子改很多，只抓1-2个最关键的习惯。"
      }
    };

    function fallbackData(type){
      return {
        subTitle: "你的人格结果已经生成，这是一个具有独特思维和行为模式的类型。",
        summary: `${type} 类型代表你在四个维度上有相对稳定的倾向。你有自己的思考方式、情绪模式与处理问题的方法。结果不是给你贴标签，而是帮助你更理解自己。`,
        strengths: [
          "你有自己独特的优势和行为节奏",
          "在适合的环境里，你会表现得更稳定",
          "你具备某些天生更顺手的能力",
          "你的成长空间非常明确",
          "你适合把优势做成长期积累"
        ],
        weaknesses: [
          "在压力环境下，某些短板会被放大",
          "你可能会在不适合的环境里被过度消耗",
          "容易误以为自己有问题，其实只是环境不匹配",
          "结果不是绝对的，而是倾向性的参考",
          "真正重要的是你如何使用这些倾向"
        ],
        love: [
          "你需要在关系里被尊重和理解",
          "情绪稳定和边界清晰会让你更舒服",
          "你更适合与能沟通的人建立长期关系",
          "你需要练习清晰表达需求",
          "越懂自己，越能建立稳定关系"
        ],
        career: [
          "适合的职业，取决于你的长期优势与消耗点",
          "选择反馈清晰的环境，会更容易积累成就感",
          "要避免长期高压、边界混乱的环境",
          "更适合能发挥你真实特质的岗位",
          "建议结合兴趣与现实资源一起判断"
        ],
        stress: [
          "你在压力下会出现明显的能量波动",
          "容易拖延、怀疑自己或变得情绪化",
          "需要先恢复状态，再去解决问题",
          "能量恢复比硬撑更重要",
          "规律作息和休息系统很关键"
        ],
        growth: [
          "每天做一点点，而不是等状态完美",
          "先完成，再优化",
          "减少让你分心的信息输入",
          "关注长期稳定，而不是一时冲刺",
          "让自己保持足够的休息",
          "学会表达边界和需求",
          "坚持一周，你会比现在更稳"
        ],
        strengthTip: "建议：把你的优势变成长期可复用的能力。",
        weaknessTip: "建议：短板不可怕，关键是别让它反复拖垮你。",
        loveTip: "建议：懂自己，才能更好地经营关系。",
        careerTip: "提示：匹配比努力更重要。",
        stressTip: "建议：你不是不行，是需要恢复和调节。",
        growthTip: "做法：一次只改一点，反而更容易坚持。"
      };
    }

    function getType(){
      const params = new URLSearchParams(location.search);
      const typeFromUrl = params.get("type");
      const typeFromStorage = localStorage.getItem("mbtiType");
      return typeFromUrl || typeFromStorage || "ISTJ";
    }

    function getScores(){
      const params = new URLSearchParams(location.search);
      const scoreKeys = ["E","I","S","N","T","F","J","P"];
      let scores = {};
      let hasAny = false;

      scoreKeys.forEach(key => {
        const val = Number(params.get(key));
        if(!isNaN(val) && params.get(key) !== null){
          scores[key] = val;
          hasAny = true;
        }
      });

      if(hasAny) return scores;

      try{
        const local = JSON.parse(localStorage.getItem("mbtiScores"));
        if(local) return local;
      }catch(e){}

      return {E:1,I:1,S:1,N:1,T:1,F:1,J:1,P:1};
    }

    function setBar(id, left, right, leftLabel, rightLabel, descId){
      const total = left + right;
      const leftPercent = total === 0 ? 50 : Math.round((left / total) * 100);
      document.getElementById(id).style.width = leftPercent + "%";

      let text = "";
      if(leftPercent > 60){
        text = `你在这一维度更偏向 ${leftLabel}。`;
      }else if(leftPercent < 40){
        text = `你在这一维度更偏向 ${rightLabel}。`;
      }else{
        text = `你在这一维度比较均衡。`;
      }
      document.getElementById(descId).textContent = text;
    }

    function fillList(id, arr){
      const ul = document.getElementById(id);
      ul.innerHTML = "";
      arr.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        ul.appendChild(li);
      });
    }

    function copyResult(){
      const type = document.getElementById("mbtiType").textContent;
      const summary = document.getElementById("summaryText").textContent;
      const text = `MBTI结果：${type}\n\n${summary}`;
      navigator.clipboard.writeText(text).then(() => {
        alert("结果摘要已复制");
      });
    }

    const type = getType();
    const scores = getScores();
    const content = dataMap[type] || fallbackData(type);

    document.getElementById("mbtiType").textContent = type;
    document.getElementById("subTitle").textContent = content.subTitle;
    document.getElementById("summaryText").textContent = content.summary;

    fillList("strengths", content.strengths);
    fillList("weaknesses", content.weaknesses);
    fillList("love", content.love);
    fillList("career", content.career);
    fillList("stress", content.stress);
    fillList("growth", content.growth);

    document.getElementById("strengthTip").textContent = content.strengthTip;
    document.getElementById("weaknessTip").textContent = content.weaknessTip;
    document.getElementById("loveTip").textContent = content.loveTip;
    document.getElementById("careerTip").textContent = content.careerTip;
    document.getElementById("stressTip").textContent = content.stressTip;
    document.getElementById("growthTip").textContent = content.growthTip;

    setBar("barEI", scores.E, scores.I, "外向 E", "内向 I", "descEI");
    setBar("barSN", scores.S, scores.N, "实感 S", "直觉 N", "descSN");
    setBar("barTF", scores.T, scores.F, "思考 T", "情感 F", "descTF");
    setBar("barJP", scores.J, scores.P, "判断 J", "感知 P", "descJP");
  </script>
</body>
</html>
